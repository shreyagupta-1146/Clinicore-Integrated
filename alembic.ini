# alembic.ini — Alembic configuration for Clinicore platform schema migrations
# Run migrations:  alembic upgrade head
# Create revision: alembic revision --autogenerate -m "describe change"
# Rollback one:    alembic downgrade -1

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Database URL is read from environment at runtime (see migrations/env.py)
# Do NOT put a real connection string here — it would be committed to Git
sqlalchemy.url = %(DATABASE_URL)s

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
