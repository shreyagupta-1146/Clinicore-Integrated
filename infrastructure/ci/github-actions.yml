name: Clinicore CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint-and-type-check:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff + mypy
        run: pip install ruff mypy

      - name: Ruff lint (all Python)
        run: ruff check .

      - name: Mypy type check (substrate)
        run: mypy substrate/ --ignore-missing-imports

      - name: Mypy type check (apps/clinicore)
        run: mypy apps/clinicore/backend/ --ignore-missing-imports

      - name: Mypy type check (apps/relaymed)
        run: mypy apps/relaymed/backend/ --ignore-missing-imports

  unit-tests-substrate:
    name: Unit Tests — Substrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: pip install pytest pytest-asyncio -r apps/clinicore/backend/requirements.txt

      - name: Run substrate unit tests
        run: pytest substrate/ -v --tb=short

  unit-tests-secops:
    name: Unit Tests — SecOps Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: pip install pytest pytest-asyncio

      - name: Run SecOps detection rule tests
        run: pytest secops/ -v --tb=short

  safety-gold-set:
    name: Safety Gold Set Evaluation
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
      ONPREM_LLM_URL: ""     # skip on-prem in CI; cloud-only eval run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install eval harness deps
        run: pip install -r ai_services/eval_harness/requirements.txt

      - name: Run safety gold set (must pass 100%)
        run: python -m pytest ai_services/eval_harness/test_safety_gold_set.py -v --tb=short

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-eval-report
          path: ai_services/eval_harness/reports/

  integration-tests:
    name: Integration Tests (docker-compose)
    runs-on: ubuntu-latest
    needs: [unit-tests-substrate, unit-tests-secops]
    steps:
      - uses: actions/checkout@v4

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Start infra services
        run: docker compose up -d postgres redis vault immudb qdrant minio

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U clinicore && break
            sleep 2
          done

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://clinicore:clinicore@localhost:5432/clinicore
          REDIS_URL: redis://:changeme@localhost:6379/0
        run: pytest tests/integration/ -v --tb=short

      - name: Tear down
        if: always()
        run: docker compose down -v

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-type-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build Clinicore backend image
        run: docker build -f apps/clinicore/backend/Dockerfile -t clinicore-backend:${{ github.sha }} .

      - name: Build RelayMed backend image
        run: docker build -f apps/relaymed/backend/Dockerfile -t relaymed-backend:${{ github.sha }} .
