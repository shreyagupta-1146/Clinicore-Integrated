# infrastructure/helm/relaymed/values.yaml

replicaCount: 2

image:
  repository: relaymed-backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8001

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: api.relaymed.in
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: relaymed-tls
      hosts:
        - api.relaymed.in

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# RelayMed uses the same shared Postgres/Redis/Vault as Clinicore
# (deploy Clinicore chart first, or use shared infrastructure chart)
postgresql:
  enabled: false   # shared with clinicore
  externalHost: postgres.clinicore.svc.cluster.local

redis:
  enabled: false   # shared with clinicore
  externalHost: redis.clinicore.svc.cluster.local

features:
  modelGatewayMode: hybrid
  phiRiskThreshold: "0.7"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
